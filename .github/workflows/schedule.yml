name: Travel Risk Report

on:
  schedule:
    - cron: '30 3 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug - Test API key directly
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python3 -c "
          import os, anthropic
          key = os.environ.get('API_KEY', 'NOT_FOUND')
          print(f'API key starts with: {key[:15]}...')
          print(f'API key length: {len(key)}')
          client = anthropic.Anthropic(api_key=key)
          try:
              response = client.messages.create(
                  model='claude-sonnet-4-20250514',
                  max_tokens=50,
                  messages=[{'role': 'user', 'content': 'Say OK'}]
              )
              print('API call SUCCESS:', response.content[0].text)
          except Exception as e:
              print(f'API call FAILED: {type(e).__name__}: {e}')
          "

      - name: Run travel risk pipeline
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MY_GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python main.py

      - name: Commit and push dashboard update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update travel risk dashboard - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
