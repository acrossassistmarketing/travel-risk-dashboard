name: Travel Risk Report

on:
  schedule:
    # Runs Mon, Wed, Fri at 3:30 AM UTC = 9:00 AM IST
    - cron: '30 3 * * 1,3,5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to push dashboard to GitHub Pages

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run travel risk pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python main.py

      - name: Commit and push dashboard update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update travel risk dashboard - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
